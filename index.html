<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dia dos Pais | O Presente Perfeito</title>
    <style>
        /* Configurações Gerais e Cores */
        :root {
            --primary-color: #1a2f4c; /* Azul Marinho Escuro */
            --secondary-color: #d4af37; /* Dourado / Âmbar */
            --text-color: #333333;
            --light-bg: #f8f9fa;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: var(--text-color);
            background-color: var(--white);
            line-height: 1.6;
        }

        /* Cabeçalho / Logo */
        header {
            background-color: var(--white);
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 1.5rem;
            fontWeight: bold;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--secondary-color);
        }

        /* Seção Hero (Destaque Principal) */
        .hero {
            background: linear-gradient(rgba(26, 47, 76, 0.85), rgba(26, 47, 76, 0.85)), url('https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=1920') no-repeat center center/cover;
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .btn-cta {
            background-color: var(--secondary-color);
            color: var(--primary-color);
            padding: 15px 35px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-cta:hover {
            background-color: var(--white);
            color: var(--primary-color);
            transform: translateY(-3px);
        }

        /* Seção de Recursos / Categorias */
        .features {
            padding: 80px 20px;
            background-color: var(--light-bg);
            text-align: center;
        }

        .section-title {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: var(--secondary-color);
            margin: 10px auto 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-icon {
            font-size: 2.5rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .card h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
