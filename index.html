<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Premium · Meu Pai Herói</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ============ RESET & BASE ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a1628;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: url('https://images.unsplash.com/photo-1609220136736-7b1e3e0b6c3e?w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 22, 40, 0.82);
            z-index: 0;
        }

        /* EFEITO DE ESTRELAS (tema herói) */
        body::after {
            content: "✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧";
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(245, 200, 66, 0.08);
            font-size: 1.2rem;
            letter-spacing: 20px;
            z-index: 0;
            pointer-events: none;
        }

        .checkout-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
        }

        /* ============ HEADER ============ */
        .checkout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0 1.5rem;
            border-bottom: 2px solid rgba(230, 36, 41, 0.3);
            margin-bottom: 2rem;
        }

        .checkout-header .logo {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 2px 20px rgba(230, 36, 41, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkout-header .logo .shield {
            display: inline-block;
            background: linear-gradient(145deg, #e62429, #c41e24);
            width: 42px;
            height: 48px;
            border-radius: 6px 6px 12px 12px;
            position: relative;
            text-align: center;
            line-height: 48px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #f5c842;
            box-shadow: 0 4px 20px rgba(230, 36, 41, 0.4);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .checkout-header .logo span {
            color: #f5c842;
        }

        .checkout-header .secure-badge {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .checkout-header .secure-badge i {
            color: #25d366;
            margin-right: 6px;
        }

        /* ============ PROGRESS BAR ============ */
        .progress-steps {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 2.5rem;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 0.5rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-steps .step {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            transition: 0.3s;
            cursor: default;
        }

        .progress-steps .step.active {
            color: #ffffff;
            background: rgba(230, 36, 41, 0.2);
        }

        .progress-steps .step .num {
            background: rgba(255, 255, 255, 0.06);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .progress-steps .step.active .num {
            background: #e62429;
            color: #ffffff;
        }

        .progress-steps .step .arrow {
            margin-left: 0.5rem;
            color: rgba(255, 255, 255, 0.1);
        }

        /* ============ MAIN GRID ============ */
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        /* ============ COLUNA ESQUERDA - PRODUTO ============ */
        .product-column {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            align-self: start;
        }

        .product-column .product-badge {
            display: inline-block;
            background: linear-gradient(145deg, #f5c842, #e6b832);
            color: #0a1628;
            font-weight: 800;
            font-size: 0.7rem;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
        }

        .product-column .product-badge i {
            margin-right: 6px;
        }

        .product-column h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.2;
        }

        .product-column h1 span {
            color: #f5c842;
        }

        .product-column .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            margin: 0.4rem 0 1rem;
        }

        /* GALERIA DE FOTOS DO PRODUTO */
        .product-gallery {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.8rem;
            margin: 1.2rem 0;
        }

        .product-gallery .gallery-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.04);
            transition: 0.3s;
            cursor: pointer;
            overflow: hidden;
        }

        .product-gallery .gallery-item:hover {
            border-color: #f5c842;
            transform: scale(1.02);
        }

        .product-gallery .gallery-item.main {
            grid-column: 1 / -1;
            height: 220px;
            font-size: 5rem;
            background: linear-gradient(145deg, rgba(230, 36, 41, 0.15), rgba(10, 22, 40, 0.3));
            border-color: rgba(230, 36, 41, 0.2);
        }

        .product-gallery .gallery-item.main i {
            color: #f5c842;
            text-shadow: 0 0 40px rgba(245, 200, 66, 0.2);
        }

        .product-gallery .gallery-item i {
            font-size: inherit;
        }

        /* PREÇO E OPÇÕES */
        .price-block {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 2px solid rgba(255, 255, 255, 0.06);
            border-bottom: 2px solid rgba(255, 255, 255, 0.06);
        }

        .price-block .current-price {
            font-size: 2.8rem;
            font-weight: 900;
            color: #f5c842;
        }

        .price-block .old-price {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: line-through;
        }

        .price-block .discount-badge {
            background: #e62429;
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }

        /* OPÇÕES DE PERSONALIZAÇÃO */
        .customization-options {
            margin: 1.2rem 0;
        }

        .customization-options label {
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            display: block;
            margin-bottom: 0.4rem;
        }

        .customization-options .option-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .customization-options .option-group button {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            font-weight: 600;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: 0.2s;
        }

        .customization-options .option-group button:hover {
            border-color: #f5c842;
            color: #ffffff;
        }

        .customization-options .option-group button.active {
            border-color: #f5c842;
            background: rgba(245, 200, 66, 0.15);
            color: #f5c842;
        }

        /* ============ UPSELL / CROSS-SELL ============ */
        .upsell-box {
            background: linear-gradient(145deg, rgba(245, 200, 66, 0.08), rgba(230, 36, 41, 0.05));
            border-radius: 20px;
            padding: 1.2rem 1.5rem;
            margin: 1.2rem 0;
            border: 2px solid rgba(245, 200, 66, 0.2);
            position: relative;
        }

        .upsell-box .upsell-tag {
            position: absolute;
            top: -12px;
            left: 20px;
            background: linear-gradient(145deg, #f5c842, #e6b832);
            color: #0a1628;
            font-weight: 800;
            font-size: 0.65rem;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upsell-box .upsell-tag i {
            margin-right: 4px;
        }

        .upsell-box .upsell-content {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .upsell-box .upsell-content .upsell-items {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .upsell-box .upsell-content .upsell-items span {
            background: rgba(255, 255, 255, 0.04);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .upsell-box .upsell-content .upsell-items span i {
            color: #f5c842;
            margin-right: 6px;
        }

        .upsell-box .upsell-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: #f5c842;
            margin-left: auto;
        }

        .upsell-box .upsell-price small {
            font-weight: 400;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: line-through;
            margin-right: 0.5rem;
        }

        .upsell-box .btn-add-upsell {
            background: linear-gradient(145deg, #e62429, #c41e24);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(230, 36, 41, 0.2);
        }

        .upsell-box .btn-add-upsell:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 30px rgba(230, 36, 41, 0.35);
        }

        .upsell-box .btn-add-upsell.added {
            background: #25d366;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.2);
        }

        /* ============ PROVA SOCIAL ============ */
        .social-proof {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            margin: 1.2rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .social-proof .item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        .social-proof .item i {
            color: #f5c842;
            font-size: 1rem;
        }

        .social-proof .item .highlight {
            font-weight: 700;
            color: #ffffff;
        }

        /* ============ TIMER DE URGÊNCIA ============ */
        .urgency-timer {
            background: rgba(230, 36, 41, 0.15);
            border: 1px solid rgba(230, 36, 41, 0.2);
            color: #ffffff;
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 700;
            font-size: 0.85rem;
            margin: 0.8rem 0;
        }

        .urgency-timer i {
            color: #e62429;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .urgency-timer .timer-numbers {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-family: 'Inter', monospace;
            font-size: 1.1rem;
            font-weight: 800;
            color: #f5c842;
        }

        /* ============ BOTÃO PRINCIPAL ============ */
        .btn-checkout-primary {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(145deg, #e62429, #c41e24);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 30px rgba(230, 36, 41, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .btn-checkout-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(230, 36, 41, 0.5);
        }

        .btn-checkout-primary i {
            font-size: 1.4rem;
        }

        /* ============ SELOS DE SEGURANÇA ============ */
        .security-seals {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }

        .security-seals .seal {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .security-seals .seal i {
            font-size: 1.2rem;
            color: #f5c842;
        }

        /* ============ GARANTIA ESTENDIDA ============ */
        .guarantee-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px dashed rgba(245, 200, 66, 0.15);
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .guarantee-box i {
            font-size: 2rem;
            color: #f5c842;
        }

        .guarantee-box .text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        .guarantee-box .text strong {
            color: #f5c842;
        }

        /* ============ COLUNA DIREITA - FORMULÁRIO ============ */
        .form-column {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }

        .form-column h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.2rem;
        }

        .form-column .form-sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.3rem;
        }

        .form-group label .required {
            color: #e62429;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            transition: 0.2s;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f5c842;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(245, 200, 66, 0.05);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* MÉTODOS DE PAGAMENTO */
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.6rem;
            margin: 0.8rem 0 1.2rem;
        }

        .payment-methods .pm-btn {
            padding: 0.8rem;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            transition: 0.2s;
            text-align: center;
        }

        .payment-methods .pm-btn:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .payment-methods .pm-btn.active {
            border-color: #f5c842;
            background: rgba(245, 200, 66, 0.08);
            color: #f5c842;
        }

        .payment-methods .pm-btn i {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 4px;
        }

        /* CARTÃO - CAMPOS */
        .card-fields {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 0.6rem;
        }

        .btn-finalizar {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(145deg, #f5c842, #e6b832);
            color: #0a1628;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
            box-shadow: 0 8px 30px rgba(245, 200, 66, 0.15);
        }

        .btn-finalizar:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(245, 200, 66, 0.25);
        }

        /* ============ DEPOIMENTOS EM VÍDEO (SIMULADOS) ============ */
        .testimonials-section {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .testimonials-section h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 1rem;
        }

        .testimonials-section h3 i {
            color: #f5c842;
            margin-right: 8px;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }

        .testimonial-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.2s;
            cursor: pointer;
        }

        .testimonial-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(245, 200, 66, 0.1);
        }

        .testimonial-card .video-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(230, 36, 41, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.6rem;
            font-size: 1.4rem;
            color: #e62429;
            border: 2px solid rgba(230, 36, 41, 0.2);
        }

        .testimonial-card .name {
            font-weight: 700;
            font-size: 0.8rem;
            color: #ffffff;
        }

        .testimonial-card .stars {
            color: #f5c842;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin: 0.2rem 0;
        }

        .testimonial-card .comment {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        /* ============ NOTIFICAÇÃO DE COMPRA AO VIVO ============ */
        .live-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(10, 22, 40, 0.92);
            backdrop-filter: blur(20px);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.85rem;
            color: #ffffff;
            z-index: 100;
            animation: slideUp 0.5s ease;
            max-width: 350px;
        }

        .live-notification .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e62429, #c41e24);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .live-notification .text .name {
            font-weight: 700;
            color: #f5c842;
        }

        .live-notification .text .time {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .live-notification .pulse-dot {
            width: 10px;
            height: 10px;
            background: #25d366;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.6);
                opacity: 0.3;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ============ WHATSAPP FIXO ============ */
        .whatsapp-fixo {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
            transition: 0.2s;
            z-index: 99;
            text-decoration: none;
        }

        .whatsapp-fixo:hover {
            transform: scale(1.1);
        }

        /* ============ RESPONSIVO ============ */
        @media (max-width: 900px) {

                grid-template-columns: 1fr;
            }

            }

            .card-fields {

            }

            .live-notification {

            .upsell-box .upsell-content {

            .upsell-box .upsell-price {

            }

            .progress-steps {
                padding: 0.4rem 0.8rem;

            }

            .progress-steps .step {
                font-size: 0.65rem;
                padding: 0.2rem 0.6rem;
            }

            .progress-steps .step .arrow {
                display: none;
            }

            .checkout-header {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
            }

            .testimonials-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .payment-methods {
                grid-template-columns: 1fr 1fr;
            }

            .card-fields {
                grid-template-columns: 1fr;
            }

            .product-column h1 {

            }

            .price-block .current-price {

            }

            .product-gallery {
                grid-template-columns: 1fr 1fr;
            }

            .product-gallery .gallery-item.main {
                grid-column: 1 / -1;
                height: 160px;
            }

            .checkout-header .logo {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
